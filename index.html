<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    /* 新增區 */
    .add-area {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .add-area input[type="text"] {
      flex: 1;
      min-width: 160px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-area input[type="text"]:focus { border-color: #4f8ef7; }

    .add-area select {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
      background: white;
      cursor: pointer;
    }

    .btn-add {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #3a7de0; }

    /* obsidian note 輸入 */
    .note-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .note-input-row input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      color: #555;
      background: #fafafa;
    }

    .note-input-row input:focus { border-color: #a78bfa; background: white; }
    .note-input-row input::placeholder { color: #bbb; }

    /* 篩選 */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f8ef7;
      color: white;
      border-color: #4f8ef7;
    }

    /* Todo 清單 */
    #todo-list { list-style: none; }

    .todo-item {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: grab;
      transition: box-shadow 0.2s, opacity 0.2s;
      border-left: 4px solid transparent;
    }

    .todo-item:active { cursor: grabbing; }
    .todo-item.dragging { opacity: 0.4; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .todo-item.drag-over { box-shadow: 0 0 0 2px #4f8ef7; }

    .todo-item[data-priority="1"] { border-left-color: #ff4d4f; }
    .todo-item[data-priority="2"] { border-left-color: #fa8c16; }
    .todo-item[data-priority="3"] { border-left-color: #52c41a; }

    .drag-handle {
      color: #ccc;
      font-size: 18px;
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    .todo-main {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 15px;
      color: #333;
      word-break: break-word;
      display: block;
    }

    .todo-note-link {
      font-size: 12px;
      color: #a78bfa;
      text-decoration: none;
      display: inline-block;
      margin-top: 3px;
    }

    .todo-note-link:hover { text-decoration: underline; }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .priority-select {
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 13px;
      outline: none;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ff4d4f; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px;
      font-size: 15px;
    }

    /* Sync bar */
    .sync-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 10px 14px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 13px;
      color: #888;
      flex-wrap: wrap;
    }

    .btn-sync {
      border: 1.5px solid #a78bfa;
      background: white;
      color: #a78bfa;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-sync:hover { background: #a78bfa; color: white; }
    .btn-sync.connected { border-color: #52c41a; color: #52c41a; }
    .btn-sync.connected:hover { background: #52c41a; color: white; }

    #sync-status { flex: 1; min-width: 120px; }

    /* Token 設定 modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .modal h2 { font-size: 18px; margin-bottom: 8px; color: #1a1a2e; }
    .modal p { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; }

    .modal input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      font-family: monospace;
    }
    .modal input:focus { border-color: #4f8ef7; }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-cancel {
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-confirm {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-confirm:hover { background: #3a7de0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Project</h1>

    <div class="add-area">
      <input type="text" id="new-todo" placeholder="新增待辦事項..." />
      <select id="new-priority">
        <option value="1">🔴 高</option>
        <option value="2" selected>🟠 中</option>
        <option value="3">🟢 低</option>
      </select>
      <button class="btn-add" onclick="addTodo()">新增</button>
    </div>

    <div class="note-input-row">
      <input type="text" id="new-note" placeholder="連結 Obsidian 筆記（選填，例如：專案/晨報）" />
    </div>

    <div class="sync-bar">
      <button class="btn-sync" id="sync-btn" onclick="openTokenModal()">⚙️ 設定 GitHub Token</button>
      <span id="sync-status">載入中...</span>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
      <button class="filter-btn" onclick="setFilter('active', this)">未完成</button>
      <button class="filter-btn" onclick="setFilter('done', this)">已完成</button>
    </div>

    <ul id="todo-list"></ul>
  </div>

  <!-- Token 設定 Modal -->
  <div class="modal-overlay" id="token-modal">
    <div class="modal">
      <h2>設定 GitHub Token</h2>
      <p>
        Token 存在你的瀏覽器裡，不會上傳。<br>
        需要 <strong>repo</strong> 權限，到 GitHub → Settings → Developer settings → Personal access tokens 建立。
      </p>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxx" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeTokenModal()">取消</button>
        <button class="btn-confirm" onclick="saveToken()">儲存並連線</button>
      </div>
    </div>
  </div>

  <script>
    const REPO = 'kuangame/todolist';
    const FILE = 'todos.md';
    const VAULT = 'MyBrain';

    let todos = [];
    let filter = 'all';
    let dragSrcIdx = null;
    let fileSha = null; // GitHub 需要 SHA 才能更新檔案

    // ── GitHub Token ──────────────────────────────────────────
    function getToken() { return localStorage.getItem('gh_token') || ''; }

    function openTokenModal() {
      document.getElementById('token-input').value = getToken();
      document.getElementById('token-modal').classList.add('show');
    }

    function closeTokenModal() {
      document.getElementById('token-modal').classList.remove('show');
    }

    async function saveToken() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) return;
      localStorage.setItem('gh_token', token);
      closeTokenModal();
      await loadFromGitHub();
    }

    // ── GitHub API ────────────────────────────────────────────
    async function loadFromGitHub() {
      const token = getToken();
      if (!token) {
        setSyncStatus('未設定 Token — 點左邊按鈕設定');
        render();
        return;
      }

      setSyncStatus('載入中...');
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
          headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
        });

        if (res.status === 404) {
          // 檔案不存在，從 localStorage 載入（或空白）
          todos = JSON.parse(localStorage.getItem('todos') || '[]');
          fileSha = null;
          setSyncStatus('GitHub 上還沒有 todos.md，新增後自動建立');
          updateSyncBtn(true);
          render();
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        fileSha = data.sha;
        const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        todos = parseTodosMd(content);
        localStorage.setItem('todos', JSON.stringify(todos));
        setSyncStatus(`已同步 — ${new Date().toLocaleTimeString()}`);
        updateSyncBtn(true);
        render();
      } catch (e) {
        setSyncStatus('載入失敗：' + e.message);
        todos = JSON.parse(localStorage.getItem('todos') || '[]');
        render();
      }
    }

    async function syncToGitHub() {
      const token = getToken();
      if (!token) return;

      const content = buildTodosMd();
      const encoded = btoa(unescape(encodeURIComponent(content)));

      const body = {
        message: `update todos [${new Date().toLocaleString('zh-TW')}]`,
        content: encoded,
      };
      if (fileSha) body.sha = fileSha;

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github.v3+json',
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        fileSha = data.content.sha;
        setSyncStatus(`已同步 — ${new Date().toLocaleTimeString()}`);
      } catch (e) {
        setSyncStatus('同步失敗：' + e.message);
      }
    }

    // ── todos.md 解析 / 產生 ──────────────────────────────────
    function parseTodosMd(md) {
      const priorityMap = { '🔴 高': 1, '🟠 中': 2, '🟢 低': 3 };
      const result = [];
      for (const line of md.split('\n')) {
        const m = line.match(/^- \[( |x)\] (🔴 高|🟠 中|🟢 低) (.+?)( — \[\[(.+?)\]\])?$/);
        if (m) {
          result.push({
            done: m[1] === 'x',
            priority: priorityMap[m[2]] || 2,
            text: m[3].trim(),
            note: m[5] || null,
          });
        }
      }
      return result;
    }

    function buildTodosMd() {
      const priorityLabel = { 1: '🔴 高', 2: '🟠 中', 3: '🟢 低' };
      const lines = [
        '---',
        `synced: ${new Date().toISOString()}`,
        '---',
        '',
        '# 專案清單',
        '',
        ...todos.map(t => {
          const status = t.done ? '[x]' : '[ ]';
          const note = t.note ? ` — [[${t.note}]]` : '';
          return `- ${status} ${priorityLabel[t.priority]} ${t.text}${note}`;
        }),
        ''
      ];
      return lines.join('\n');
    }

    // ── UI helpers ────────────────────────────────────────────
    function setSyncStatus(msg) {
      document.getElementById('sync-status').textContent = msg;
    }

    function updateSyncBtn(connected) {
      const btn = document.getElementById('sync-btn');
      if (connected) {
        btn.textContent = '⚙️ Token 已設定';
        btn.classList.add('connected');
      } else {
        btn.textContent = '⚙️ 設定 GitHub Token';
        btn.classList.remove('connected');
      }
    }

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      syncToGitHub();
    }

    function obsidianUrl(note) {
      if (!note) return null;
      return `obsidian://open?vault=${encodeURIComponent(VAULT)}&file=${encodeURIComponent(note)}`;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">沒有待辦事項</div>';
        return;
      }

      list.innerHTML = filtered.map((t) => {
        const realIdx = todos.indexOf(t);
        const noteUrl = obsidianUrl(t.note);
        const noteHtml = noteUrl
          ? `<a class="todo-note-link" href="${noteUrl}" onclick="event.stopPropagation()">📂 ${escHtml(t.note)}</a>`
          : '';
        return `
          <li class="todo-item ${t.done ? 'done' : ''}"
              data-priority="${t.priority}"
              draggable="true"
              ondragstart="dragStart(event, ${realIdx})"
              ondragover="dragOver(event)"
              ondrop="drop(event, ${realIdx})"
              ondragend="dragEnd(event)">
            <span class="drag-handle">⠿</span>
            <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''}
              onchange="toggleDone(${realIdx})" />
            <div class="todo-main">
              <span class="todo-text">${escHtml(t.text)}</span>
              ${noteHtml}
            </div>
            <select class="priority-select" onchange="changePriority(${realIdx}, this.value)">
              <option value="1" ${t.priority==1?'selected':''}>🔴 高</option>
              <option value="2" ${t.priority==2?'selected':''}>🟠 中</option>
              <option value="3" ${t.priority==3?'selected':''}>🟢 低</option>
            </select>
            <button class="btn-delete" onclick="deleteTodo(${realIdx})">✕</button>
          </li>`;
      }).join('');
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const priority = parseInt(document.getElementById('new-priority').value);
      const note = document.getElementById('new-note').value.trim();
      todos.push({ text, priority, done: false, note: note || null });
      todos.sort((a, b) => a.priority - b.priority);
      save();
      render();
      input.value = '';
      document.getElementById('new-note').value = '';
      input.focus();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function toggleDone(idx) { todos[idx].done = !todos[idx].done; save(); render(); }
    function deleteTodo(idx) { todos.splice(idx, 1); save(); render(); }
    function changePriority(idx, val) { todos[idx].priority = parseInt(val); save(); render(); }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function dragStart(e, idx) {
      dragSrcIdx = idx;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }

    function drop(e, idx) {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const moved = todos.splice(dragSrcIdx, 1)[0];
      todos.splice(idx, 0, moved);
      save(); render();
    }

    function dragEnd(e) {
      dragSrcIdx = null;
      document.querySelectorAll('.todo-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
    }

    // 啟動
    loadFromGitHub();
  </script>
</body>
</html>
