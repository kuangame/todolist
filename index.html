<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    /* 新增區 */
    .add-area {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .add-area input[type="text"] {
      flex: 1;
      min-width: 160px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-area input[type="text"]:focus { border-color: #4f8ef7; }

    .add-area select {
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
      background: white;
      cursor: pointer;
    }

    .btn-add {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #3a7de0; }

    /* obsidian note 輸入 */
    .note-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .note-input-row input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      color: #555;
      background: #fafafa;
    }

    .note-input-row input:focus { border-color: #a78bfa; background: white; }
    .note-input-row input::placeholder { color: #bbb; }

    /* 篩選 */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f8ef7;
      color: white;
      border-color: #4f8ef7;
    }

    /* Todo 清單 */
    #todo-list { list-style: none; }

    .todo-item {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: grab;
      transition: box-shadow 0.2s, opacity 0.2s;
      border-left: 4px solid transparent;
    }

    .todo-item:active { cursor: grabbing; }
    .todo-item.dragging { opacity: 0.4; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .todo-item.drag-over { box-shadow: 0 0 0 2px #4f8ef7; }

    .todo-item[data-priority="1"] { border-left-color: #ff4d4f; }
    .todo-item[data-priority="2"] { border-left-color: #fa8c16; }
    .todo-item[data-priority="3"] { border-left-color: #52c41a; }

    .drag-handle {
      color: #ccc;
      font-size: 18px;
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    .todo-main {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 15px;
      color: #333;
      word-break: break-word;
      display: block;
    }

    .todo-note-link {
      font-size: 12px;
      color: #a78bfa;
      text-decoration: none;
      display: inline-block;
      margin-top: 3px;
    }

    .todo-note-link:hover { text-decoration: underline; }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .priority-select {
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 13px;
      outline: none;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ff4d4f; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Project</h1>

    <div class="add-area">
      <input type="text" id="new-todo" placeholder="新增待辦事項..." />
      <select id="new-priority">
        <option value="1">🔴 高</option>
        <option value="2" selected>🟠 中</option>
        <option value="3">🟢 低</option>
      </select>
      <button class="btn-add" onclick="addTodo()">新增</button>
    </div>

    <div class="note-input-row">
      <input type="text" id="new-note" placeholder="連結 Obsidian 筆記（選填，例如：專案/晨報）" />
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
      <button class="filter-btn" onclick="setFilter('active', this)">未完成</button>
      <button class="filter-btn" onclick="setFilter('done', this)">已完成</button>
    </div>

    <ul id="todo-list"></ul>
  </div>

  <script>
    const VAULT = 'MyBrain';
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let dragSrcIdx = null;

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function obsidianUrl(note) {
      if (!note) return null;
      return `obsidian://open?vault=${encodeURIComponent(VAULT)}&file=${encodeURIComponent(note)}`;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">沒有待辦事項</div>';
        return;
      }

      list.innerHTML = filtered.map((t) => {
        const realIdx = todos.indexOf(t);
        const noteUrl = obsidianUrl(t.note);
        const noteHtml = noteUrl
          ? `<a class="todo-note-link" href="${noteUrl}" onclick="event.stopPropagation()">📂 ${escHtml(t.note)}</a>`
          : '';
        return `
          <li class="todo-item ${t.done ? 'done' : ''}"
              data-priority="${t.priority}"
              draggable="true"
              ondragstart="dragStart(event, ${realIdx})"
              ondragover="dragOver(event)"
              ondrop="drop(event, ${realIdx})"
              ondragend="dragEnd(event)">
            <span class="drag-handle">⠿</span>
            <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''}
              onchange="toggleDone(${realIdx})" />
            <div class="todo-main">
              <span class="todo-text">${escHtml(t.text)}</span>
              ${noteHtml}
            </div>
            <select class="priority-select" onchange="changePriority(${realIdx}, this.value)">
              <option value="1" ${t.priority==1?'selected':''}>🔴 高</option>
              <option value="2" ${t.priority==2?'selected':''}>🟠 中</option>
              <option value="3" ${t.priority==3?'selected':''}>🟢 低</option>
            </select>
            <button class="btn-delete" onclick="deleteTodo(${realIdx})">✕</button>
          </li>`;
      }).join('');
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      const priority = parseInt(document.getElementById('new-priority').value);
      const note = document.getElementById('new-note').value.trim();
      todos.push({ text, priority, done: false, note: note || null });
      todos.sort((a, b) => a.priority - b.priority);
      save();
      render();
      input.value = '';
      document.getElementById('new-note').value = '';
      input.focus();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function toggleDone(idx) {
      todos[idx].done = !todos[idx].done;
      save(); render();
    }

    function deleteTodo(idx) {
      todos.splice(idx, 1);
      save(); render();
    }

    function changePriority(idx, val) {
      todos[idx].priority = parseInt(val);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function dragStart(e, idx) {
      dragSrcIdx = idx;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function dragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }

    function drop(e, idx) {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const moved = todos.splice(dragSrcIdx, 1)[0];
      todos.splice(idx, 0, moved);
      save(); render();
    }

    function dragEnd(e) {
      dragSrcIdx = null;
      document.querySelectorAll('.todo-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
    }

    render();
  </script>
</body>
</html>
