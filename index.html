<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header h1 { font-size: 22px; color: #1a1a2e; }

    .btn-token {
      border: 1.5px solid #a78bfa;
      background: white;
      color: #a78bfa;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-token:hover { background: #a78bfa; color: white; }
    .btn-token.connected { border-color: #52c41a; color: #52c41a; }
    .btn-token.connected:hover { background: #52c41a; color: white; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: white;
      border-radius: 12px;
      padding: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 9px;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active { background: #4f8ef7; color: white; }

    /* Sync status */
    .sync-status {
      text-align: right;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 16px;
      min-height: 16px;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── PROJECT ──────────────────────────── */
    .add-area {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .add-area input[type="text"] {
      flex: 1; min-width: 160px;
      border: 1.5px solid #ddd; border-radius: 8px;
      padding: 10px 14px; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .add-area input[type="text"]:focus { border-color: #4f8ef7; }

    .add-area select {
      border: 1.5px solid #ddd; border-radius: 8px;
      padding: 10px; font-size: 14px; outline: none;
      background: white; cursor: pointer;
    }

    .btn-add {
      background: #4f8ef7; color: white; border: none;
      border-radius: 8px; padding: 10px 18px;
      font-size: 15px; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #3a7de0; }

    .sub-input-row {
      display: flex; gap: 8px; margin-bottom: 8px; padding: 0 2px;
    }
    .sub-input-row input, .sub-input-row textarea {
      flex: 1; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; outline: none;
      color: #555; background: #fafafa; font-family: inherit;
    }
    .sub-input-row input:focus, .sub-input-row textarea:focus {
      border-color: #a78bfa; background: white;
    }
    .sub-input-row input::placeholder, .sub-input-row textarea::placeholder { color: #bbb; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; margin-top: 12px; }

    .filter-btn {
      border: 1.5px solid #ddd; background: white;
      border-radius: 20px; padding: 6px 16px;
      font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: #4f8ef7; color: white; border-color: #4f8ef7; }

    #todo-list { list-style: none; }

    .todo-item {
      background: white; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      cursor: grab; transition: box-shadow 0.2s, opacity 0.2s;
      border-left: 4px solid transparent;
    }
    .todo-item:active { cursor: grabbing; }
    .todo-item.dragging { opacity: 0.4; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .todo-item.drag-over { box-shadow: 0 0 0 2px #4f8ef7; }
    .todo-item[data-priority="1"] { border-left-color: #ff4d4f; }
    .todo-item[data-priority="2"] { border-left-color: #fa8c16; }
    .todo-item[data-priority="3"] { border-left-color: #52c41a; }

    .drag-handle { color: #ccc; font-size: 18px; cursor: grab; user-select: none; flex-shrink: 0; }
    .todo-check { width: 20px; height: 20px; cursor: pointer; accent-color: #4f8ef7; flex-shrink: 0; }
    .todo-main { flex: 1; min-width: 0; }
    .todo-text { font-size: 15px; color: #333; word-break: break-word; display: block; cursor: pointer; }
    .todo-text:hover { color: #4f8ef7; }
    .todo-note-link { font-size: 12px; color: #a78bfa; text-decoration: none; display: inline-block; margin-top: 3px; }
    .todo-note-link:hover { text-decoration: underline; }
    .todo-desc { font-size: 13px; color: #888; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; display: none; }
    .todo-item.expanded .todo-desc { display: block; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #aaa; }

    .priority-select { border: 1px solid #eee; border-radius: 6px; padding: 4px 6px; font-size: 13px; outline: none; background: white; cursor: pointer; flex-shrink: 0; }

    .btn-edit, .btn-delete {
      background: none; border: none; cursor: pointer;
      padding: 0 4px; flex-shrink: 0; transition: color 0.2s;
    }
    .btn-edit { color: #ccc; font-size: 15px; }
    .btn-edit:hover { color: #4f8ef7; }
    .btn-delete { color: #ccc; font-size: 18px; }
    .btn-delete:hover { color: #ff4d4f; }

    .empty { text-align: center; color: #bbb; padding: 40px; font-size: 15px; }

    /* ── 交割計算機 ────────────────────────── */
    .calc-cash-row {
      background: white; border-radius: 12px;
      padding: 16px 20px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 16px;
    }

    .calc-cash-row label { font-size: 15px; font-weight: 600; color: #444; white-space: nowrap; }

    .cash-input {
      flex: 1; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 10px 14px; font-size: 18px; font-weight: 700;
      outline: none; text-align: right;
      font-family: 'SF Mono', 'Menlo', monospace;
      transition: border-color 0.2s;
    }
    .cash-input:focus { border-color: #4f8ef7; }

    .table-wrap {
      background: white; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden; margin-bottom: 16px;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: #f8f9fb; padding: 12px 16px;
      font-size: 13px; color: #888; font-weight: 600;
      text-align: right; border-bottom: 1px solid #f0f0f0;
    }
    thead th:first-child { text-align: left; }

    tbody td {
      padding: 12px 16px; border-bottom: 1px solid #f5f5f5; text-align: right;
    }
    tbody td:first-child { text-align: left; font-weight: 600; color: #444; font-size: 15px; }
    tbody tr:last-child td { border-bottom: none; }

    tfoot td {
      padding: 13px 16px; text-align: right;
      background: #f8f9fb; font-weight: 700; font-size: 15px;
      border-top: 2px solid #eee;
    }
    tfoot td:first-child { text-align: left; color: #555; }

    .num-input {
      width: 130px; border: 1.5px solid #eee; border-radius: 8px;
      padding: 8px 10px; font-size: 14px; text-align: right; outline: none;
      transition: border-color 0.2s;
      font-family: 'SF Mono', 'Menlo', monospace; color: #333;
    }
    .num-input:focus { border-color: #4f8ef7; }

    .pos { color: #389e0d; font-weight: 600; }
    .neg { color: #cf1322; font-weight: 600; }
    .zero { color: #999; }

    .result-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }

    .card {
      background: white; border-radius: 12px;
      padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center;
    }
    .card-label { font-size: 12px; color: #999; margin-bottom: 6px; }
    .card-value { font-size: 19px; font-weight: 700; font-family: 'SF Mono', 'Menlo', monospace; }
    .card-sub { font-size: 11px; color: #bbb; margin-top: 4px; }

    .btn-reset {
      display: block; margin: 0 auto;
      border: 1.5px solid #ddd; background: white; border-radius: 8px;
      padding: 8px 24px; font-size: 14px; color: #888; cursor: pointer; transition: all 0.2s;
    }
    .btn-reset:hover { border-color: #ff4d4f; color: #ff4d4f; }

    /* Modals */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 28px;
      width: 90%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 { font-size: 18px; margin-bottom: 8px; color: #1a1a2e; }
    .modal p { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; }
    .modal input, .modal select, .modal textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; outline: none;
      margin-bottom: 12px; font-family: inherit;
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #4f8ef7; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel { border: 1.5px solid #ddd; background: white; border-radius: 8px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
    .btn-confirm { background: #4f8ef7; color: white; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; cursor: pointer; }
    .btn-confirm:hover { background: #3a7de0; }

    @media (max-width: 480px) {
      .num-input { width: 100px; font-size: 13px; }
      .result-cards { grid-template-columns: 1fr; }
    }

    /* 晨報 Markdown 樣式 */
    #report-content h2 { font-size: 16px; color: #1a1a2e; margin: 20px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0; }
    #report-content h2:first-child { margin-top: 0; }
    #report-content ul { padding-left: 18px; margin: 6px 0; }
    #report-content li { margin-bottom: 6px; }
    #report-content strong { color: #1a1a2e; }
    #report-content p { margin: 6px 0; }

    .market-chip {
      background: white; border-radius: 10px; padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); font-size: 13px; text-align: center; min-width: 90px;
    }
    .market-chip .chip-name { color: #999; font-size: 11px; margin-bottom: 3px; }
    .market-chip .chip-val { font-weight: 700; font-family: 'SF Mono','Menlo',monospace; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>📊 Dashboard <span style="font-size:12px;color:#bbb;font-weight:400;">v4</span></h1>
    <button class="btn-token" id="token-btn" onclick="openTokenModal()">⚙️ 設定 Token</button>
  </div>

  <div class="sync-status" id="sync-status">載入中...</div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('project', this)">📋 Project</button>
    <button class="tab-btn" onclick="switchTab('calc', this)">💰 交割計算機</button>
    <button class="tab-btn" onclick="switchTab('report', this)">📰 晨報</button>
  </div>

  <!-- Project Tab -->
  <div class="tab-panel active" id="tab-project">
    <div class="add-area">
      <input type="text" id="new-todo" placeholder="新增專案..." />
      <select id="new-priority">
        <option value="1">🔴 高</option>
        <option value="2" selected>🟠 中</option>
        <option value="3">🟢 低</option>
      </select>
      <button class="btn-add" onclick="addTodo()">新增</button>
    </div>
    <div class="sub-input-row">
      <input type="text" id="new-note" placeholder="Obsidian 筆記連結（選填）" />
    </div>
    <div class="sub-input-row" style="margin-bottom:4px;">
      <textarea id="new-desc" rows="2" placeholder="描述（選填）"></textarea>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
      <button class="filter-btn" onclick="setFilter('active', this)">未完成</button>
      <button class="filter-btn" onclick="setFilter('done', this)">已完成</button>
    </div>

    <ul id="todo-list"></ul>
  </div>

  <!-- 交割計算機 Tab -->
  <div class="tab-panel" id="tab-calc">
    <div class="calc-cash-row">
      <label>💵 現金 <span id="date-today" style="color:#bbb;font-size:12px;font-weight:400;"></span></label>
      <input class="cash-input" type="number" id="calc-cash" placeholder="0" oninput="calcRecalc()" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>帳戶</th>
            <th>T+1 交割款<br><span id="date-t1" style="font-size:11px;color:#bbb;font-weight:400;"></span></th>
            <th>T+2 交割款<br><span id="date-t2" style="font-size:11px;color:#bbb;font-weight:400;"></span></th>
          </tr>
        </thead>
        <tbody id="calc-rows"></tbody>
        <tfoot>
          <tr>
            <td>合計</td>
            <td id="sum-t1">—</td>
            <td id="sum-t2">—</td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="result-cards">
      <div class="card">
        <div class="card-label">現金</div>
        <div class="card-value" id="res-cash">—</div>
        <div class="card-sub">目前持有</div>
      </div>
      <div class="card">
        <div class="card-label">T+1 後餘額</div>
        <div class="card-value" id="res-t1">—</div>
        <div class="card-sub">現金 + T+1</div>
      </div>
      <div class="card">
        <div class="card-label">T+2 後餘額</div>
        <div class="card-value" id="res-t2">—</div>
        <div class="card-sub">現金 + T+1 + T+2</div>
      </div>
    </div>

    <button class="btn-reset" onclick="calcReset()">清除全部</button>
  </div>

  <!-- 晨報 Tab -->
  <div class="tab-panel" id="tab-report">
    <div id="report-meta" style="font-size:13px;color:#bbb;margin-bottom:16px;text-align:right;"></div>
    <div id="report-market" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;"></div>
<div id="report-content" style="background:white;border-radius:14px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.07);font-size:14px;line-height:1.8;color:#333;"></div>
  </div>

</div>

<!-- Token Modal -->
<div class="modal-overlay" id="token-modal">
  <div class="modal">
    <h2>設定 GitHub Token</h2>
    <p>Token 存在瀏覽器裡，不會上傳。<br>需要 <strong>Contents: Read and write</strong> 權限（kuangame/todolist repo）。</p>
    <input type="password" id="token-input" placeholder="github_pat_xxxxxxxx" style="font-family:monospace;" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTokenModal()">取消</button>
      <button class="btn-confirm" onclick="saveToken()">儲存並連線</button>
    </div>
  </div>
</div>

<!-- 編輯 Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>編輯項目</h2>
    <input type="text" id="edit-text" placeholder="專案名稱" />
    <select id="edit-priority">
      <option value="1">🔴 高</option>
      <option value="2">🟠 中</option>
      <option value="3">🟢 低</option>
    </select>
    <input type="text" id="edit-note" placeholder="Obsidian 筆記（選填）" />
    <textarea id="edit-desc" rows="3" placeholder="描述（選填）"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn-confirm" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<script>
  const REPO = 'kuangame/todolist';
  const VAULT = 'MyBrain';
  const ACCOUNTS = ['富邦', '元大', '凱基'];

  // ── Tab ───────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── Token ─────────────────────────────────────────────────
  function getToken() { return localStorage.getItem('gh_token') || ''; }

  function openTokenModal() {
    document.getElementById('token-input').value = getToken();
    document.getElementById('token-modal').classList.add('show');
  }
  function closeTokenModal() { document.getElementById('token-modal').classList.remove('show'); }

  async function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) return;
    localStorage.setItem('gh_token', t);
    closeTokenModal();
    await Promise.all([loadTodos(), loadCalc()]);
  }

  function setSyncStatus(msg) { document.getElementById('sync-status').textContent = msg; }

  function updateTokenBtn(connected) {
    const btn = document.getElementById('token-btn');
    btn.textContent = connected ? '⚙️ Token 已設定' : '⚙️ 設定 Token';
    btn.className = 'btn-token' + (connected ? ' connected' : '');
  }

  // ── GitHub API 通用 ───────────────────────────────────────
  async function ghGet(file) {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${file}?t=${Date.now()}`, {
      headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' },
      cache: 'no-store'
    });
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function ghPut(file, content, sha, message) {
    const body = { message, content: btoa(unescape(encodeURIComponent(content))) };
    if (sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${file}`, {
      method: 'PUT',
      headers: {
        Authorization: `token ${getToken()}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── PROJECT ───────────────────────────────────────────────
  let todos = [];
  let filter = 'all';
  let dragSrcIdx = null;
  let todosSha = null;

  async function loadTodos() {
    if (!getToken()) { setSyncStatus('未設定 Token'); render(); return; }
    setSyncStatus('載入中...');
    try {
      const data = await ghGet('todos.md');
      if (!data) {
        todos = JSON.parse(localStorage.getItem('todos') || '[]');
        todosSha = null;
      } else {
        todosSha = data.sha;
        todos = parseTodosMd(b64decode(data.content));
        localStorage.setItem('todos', JSON.stringify(todos));
      }
      updateTokenBtn(true);
      setSyncStatus(`已同步 — ${new Date().toLocaleTimeString()}`);
      render();
    } catch (e) {
      setSyncStatus('載入失敗：' + e.message);
      todos = JSON.parse(localStorage.getItem('todos') || '[]');
      render();
    }
  }

  async function saveTodos() {
    localStorage.setItem('todos', JSON.stringify(todos));
    if (!getToken()) return;
    try {
      const result = await ghPut('todos.md', buildTodosMd(), todosSha,
        `update todos [${new Date().toLocaleString('zh-TW')}]`);
      todosSha = result.content.sha;
      setSyncStatus(`已同步 — ${new Date().toLocaleTimeString()}`);
    } catch (e) { setSyncStatus('同步失敗：' + e.message); }
  }

  function parseTodosMd(md) {
    const priorityMap = { '🔴 高': 1, '🟠 中': 2, '🟢 低': 3 };
    const result = [];
    for (const line of md.split('\n')) {
      const m = line.match(/^- \[( |x)\] (🔴 高|🟠 中|🟢 低) (.+?)( — \[\[(.+?)\]\])?$/);
      if (m) {
        result.push({ done: m[1]==='x', priority: priorityMap[m[2]]||2, text: m[3].trim(), note: m[5]||null, desc: null });
      } else if (result.length > 0 && line.startsWith('  > ')) {
        result[result.length-1].desc = line.slice(4);
      }
    }
    return result;
  }

  function buildTodosMd() {
    const lbl = { 1:'🔴 高', 2:'🟠 中', 3:'🟢 低' };
    return ['---', `synced: ${new Date().toISOString()}`, '---', '', '# 專案清單', '',
      ...todos.flatMap(t => {
        const lines = [`- ${t.done?'[x]':'[ ]'} ${lbl[t.priority]} ${t.text}${t.note?` — [[${t.note}]]`:''}`];
        if (t.desc) lines.push(`  > ${t.desc}`);
        return lines;
      }), ''].join('\n');
  }

  function render() {
    const list = document.getElementById('todo-list');
    const filtered = todos.filter(t => filter==='active'?!t.done : filter==='done'?t.done : true);
    if (!filtered.length) { list.innerHTML = '<div class="empty">沒有待辦事項</div>'; return; }
    list.innerHTML = filtered.map(t => {
      const i = todos.indexOf(t);
      const noteHtml = t.note
        ? `<a class="todo-note-link" href="obsidian://open?vault=${encodeURIComponent(VAULT)}&file=${encodeURIComponent(t.note)}" onclick="event.stopPropagation()">📂 ${esc(t.note)}</a>`
        : '';
      const descHtml = t.desc ? `<div class="todo-desc">${esc(t.desc)}</div>` : '';
      return `<li class="todo-item ${t.done?'done':''}" data-priority="${t.priority}"
          draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="drop(event,${i})" ondragend="dragEnd(event)">
        <span class="drag-handle">⠿</span>
        <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleDone(${i})" />
        <div class="todo-main">
          <span class="todo-text" onclick="toggleExpand(this)">${esc(t.text)}${t.desc?' <span style="color:#ccc;font-size:11px;">▾</span>':''}</span>
          ${noteHtml}${descHtml}
        </div>
        <select class="priority-select" onchange="changePriority(${i},this.value)">
          <option value="1" ${t.priority==1?'selected':''}>🔴 高</option>
          <option value="2" ${t.priority==2?'selected':''}>🟠 中</option>
          <option value="3" ${t.priority==3?'selected':''}>🟢 低</option>
        </select>
        <button class="btn-edit" onclick="openEditModal(${i})" title="編輯">✎</button>
        <button class="btn-delete" onclick="deleteTodo(${i})">✕</button>
      </li>`;
    }).join('');
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTodo() {
    const input = document.getElementById('new-todo');
    const text = input.value.trim();
    if (!text) return;
    todos.push({ text, priority: parseInt(document.getElementById('new-priority').value), done: false,
      note: document.getElementById('new-note').value.trim() || null,
      desc: document.getElementById('new-desc').value.trim() || null });
    todos.sort((a,b) => a.priority - b.priority);
    saveTodos(); render();
    input.value = '';
    document.getElementById('new-note').value = '';
    document.getElementById('new-desc').value = '';
    input.focus();
  }

  document.getElementById('new-todo').addEventListener('keydown', e => { if (e.key==='Enter') addTodo(); });

  let editingIdx = null;
  function openEditModal(i) {
    editingIdx = i; const t = todos[i];
    document.getElementById('edit-text').value = t.text;
    document.getElementById('edit-priority').value = t.priority;
    document.getElementById('edit-note').value = t.note || '';
    document.getElementById('edit-desc').value = t.desc || '';
    document.getElementById('edit-modal').classList.add('show');
  }
  function closeEditModal() { editingIdx = null; document.getElementById('edit-modal').classList.remove('show'); }
  function saveEdit() {
    if (editingIdx === null) return;
    const text = document.getElementById('edit-text').value.trim();
    if (!text) return;
    todos[editingIdx] = { ...todos[editingIdx], text,
      priority: parseInt(document.getElementById('edit-priority').value),
      note: document.getElementById('edit-note').value.trim() || null,
      desc: document.getElementById('edit-desc').value.trim() || null };
    closeEditModal(); saveTodos(); render();
  }

  function toggleExpand(el) { el.closest('.todo-item').classList.toggle('expanded'); }
  function toggleDone(i) { todos[i].done = !todos[i].done; saveTodos(); render(); }
  function deleteTodo(i) { todos.splice(i,1); saveTodos(); render(); }
  function changePriority(i, v) { todos[i].priority = parseInt(v); saveTodos(); render(); }
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); render();
  }
  function dragStart(e,i) { dragSrcIdx=i; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
  function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
  function drop(e,i) { e.preventDefault(); if (dragSrcIdx===null||dragSrcIdx===i) return; todos.splice(i,0,todos.splice(dragSrcIdx,1)[0]); saveTodos(); render(); }
  function dragEnd(e) { dragSrcIdx=null; document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('dragging','drag-over')); }

  // ── 工作日計算 ─────────────────────────────────────────────
  // 2026 台股休市日（週末自動排除，這裡只列國定假日）
  const TW_HOLIDAYS = new Set([
    '2026-01-01','2026-01-02',                          // 元旦
    '2026-02-16','2026-02-17','2026-02-18',             // 春節
    '2026-02-19','2026-02-20','2026-02-23',             // 春節連假
    '2026-02-28',                                       // 和平紀念日
    '2026-04-03','2026-04-04','2026-04-05','2026-04-06',// 兒童節/清明
    '2026-05-01',                                       // 勞動節
    '2026-06-19','2026-06-20',                          // 端午節
    '2026-09-25','2026-09-26',                          // 中秋節
    '2026-10-09','2026-10-10',                          // 國慶日
  ]);

  function localDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function parseLocalDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function isWorkDay(d) {
    const day = d.getDay();
    if (day === 0 || day === 6) return false;
    return !TW_HOLIDAYS.has(localDateStr(d));
  }

  function addWorkDays(date, n) {
    let d = new Date(date); d.setHours(0, 0, 0, 0);
    let count = 0;
    while (count < n) { d.setDate(d.getDate() + 1); if (isWorkDay(d)) count++; }
    return d;
  }

  function countWorkDaysBetween(from, to) {
    let d = new Date(from); d.setHours(0, 0, 0, 0);
    const end = new Date(to); end.setHours(0, 0, 0, 0);
    let count = 0;
    while (d < end) { d.setDate(d.getDate() + 1); if (isWorkDay(d)) count++; }
    return count;
  }

  function fmtDate(d) { return `${d.getMonth() + 1}/${d.getDate()}`; }

  function updateCalcDates() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    document.getElementById('date-today').textContent = `(${fmtDate(today)})`;
    document.getElementById('date-t1').textContent = fmtDate(addWorkDays(today, 1));
    document.getElementById('date-t2').textContent = fmtDate(addWorkDays(today, 2));
  }

  // ── 交割計算機 ─────────────────────────────────────────────
  let calcSha = null;
  let calcData = { cash: '', accounts: { 富邦:{t1:'',t2:''}, 元大:{t1:'',t2:''}, 凱基:{t1:'',t2:''} }, lastDate: null };

  function buildCalcRows() {
    updateCalcDates();
    document.getElementById('calc-cash').value = calcData.cash || '';
    document.getElementById('calc-rows').innerHTML = ACCOUNTS.map(acc => `
      <tr>
        <td>${acc}</td>
        ${['t1','t2'].map(f => `<td><input class="num-input" type="number" id="calc-${acc}-${f}"
          value="${calcData.accounts[acc]?.[f] || ''}" placeholder="0" oninput="calcRecalc()" /></td>`).join('')}
      </tr>`).join('');
  }

  function rollCalcIfNeeded() {
    if (!calcData.lastDate) return;
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const last = parseLocalDate(calcData.lastDate);
    const days = countWorkDaysBetween(last, today);
    if (days <= 0) return;

    // 每過一個工作日：T+1 入帳到現金，T+2 → T+1，T+2 清空
    for (let i = 0; i < Math.min(days, 2); i++) {
      const t1Sum = ACCOUNTS.reduce((sum, acc) => sum + (parseFloat(calcData.accounts[acc].t1) || 0), 0);
      calcData.cash = String((parseFloat(calcData.cash) || 0) + t1Sum);
      ACCOUNTS.forEach(acc => {
        calcData.accounts[acc].t1 = calcData.accounts[acc].t2;
        calcData.accounts[acc].t2 = '';
      });
    }
    if (days >= 3) {
      // 超過兩個工作日，T+2 也已結算，清空
      const t1Sum = ACCOUNTS.reduce((sum, acc) => sum + (parseFloat(calcData.accounts[acc].t1) || 0), 0);
      calcData.cash = String((parseFloat(calcData.cash) || 0) + t1Sum);
      ACCOUNTS.forEach(acc => { calcData.accounts[acc].t1 = ''; calcData.accounts[acc].t2 = ''; });
    }
    calcData.lastDate = localDateStr(today);
  }

  function calcVal(id) { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? 0 : v; }

  function fmtNum(n) {
    const s = Math.abs(n).toLocaleString('zh-TW', { maximumFractionDigits: 0 });
    return (n < 0 ? '-' : (n > 0 ? '+' : '')) + s;
  }

  function setColored(id, n) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = fmtNum(n);
    el.className = n > 0 ? 'pos' : n < 0 ? 'neg' : 'zero';
  }

  function calcRecalc() {
    // 記錄今天日期（供下次自動滾動用）
    const today = new Date(); today.setHours(0,0,0,0);
    calcData.lastDate = localDateStr(today);
    // 讀取並更新 calcData
    calcData.cash = document.getElementById('calc-cash').value;
    ACCOUNTS.forEach(acc => {
      if (!calcData.accounts[acc]) calcData.accounts[acc] = {};
      ['t1','t2'].forEach(f => {
        calcData.accounts[acc][f] = document.getElementById(`calc-${acc}-${f}`)?.value || '';
      });
    });

    const cash = calcVal('calc-cash');
    let sumT1 = 0, sumT2 = 0;
    ACCOUNTS.forEach(acc => { sumT1 += calcVal(`calc-${acc}-t1`); sumT2 += calcVal(`calc-${acc}-t2`); });

    setColored('sum-t1', sumT1);
    setColored('sum-t2', sumT2);
    setColored('res-cash', cash);
    setColored('res-t1', cash + sumT1);
    setColored('res-t2', cash + sumT1 + sumT2);

    saveCalc();
  }

  function b64decode(str) {
    const binary = atob(str.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

  async function loadCalc() {
    if (!getToken()) { buildCalcRows(); calcRecalc(); return; }
    try {
      const data = await ghGet('calculator.json');
      if (data) {
        calcSha = data.sha;
        calcData = JSON.parse(b64decode(data.content));
        rollCalcIfNeeded();
      }
      buildCalcRows();
      calcRecalc();
    } catch (e) {
      buildCalcRows(); // 顯示空白，但不呼叫 calcRecalc 避免覆蓋 GitHub 資料
    }
  }

  let calcSaveTimer = null;
  function saveCalc() {
    clearTimeout(calcSaveTimer);
    calcSaveTimer = setTimeout(async () => {
      if (!getToken()) return;
      try {
        const result = await ghPut('calculator.json', JSON.stringify(calcData), calcSha,
          `update calculator [${new Date().toLocaleString('zh-TW')}]`);
        calcSha = result.content.sha;
      } catch (e) { /* silent */ }
    }, 1000); // debounce 1秒，避免每次按鍵都 API call
  }

  function calcReset() {
    if (!confirm('確定清除所有數字？')) return;
    calcData = { cash: '', accounts: { 富邦:{t1:'',t2:''}, 元大:{t1:'',t2:''}, 凱基:{t1:'',t2:''} } };
    calcSha = null;
    buildCalcRows();
    calcRecalc();
  }

  // ── 晨報 ──────────────────────────────────────────────────
  function mdToHtml(md) {
    return md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/^(?!<[hup])(.+)$/gm, '$1')
      .replace(/(<\/ul>|<\/h2>)\s*(<p>|<\/p>)/g, '$1');
  }

  async function loadReport() {
    if (!getToken()) return;
    try {
      const data = await ghGet('morning_report.json');
      if (!data) { document.getElementById('report-content').innerHTML = '<p style="color:#bbb;text-align:center;padding:40px;">今日晨報尚未產生</p>'; return; }
      const report = JSON.parse(b64decode(data.content));

      // 日期
      const confsDebug = report.conferences || [];
      document.getElementById('report-meta').textContent = `產生時間：${new Date(report.generated_at).toLocaleString('zh-TW')} ｜ 法說會 ${confsDebug.length} 間`;

      // 市場指數 chips
      const market = report.market || {};
      document.getElementById('report-market').innerHTML = Object.entries(market).map(([name, d]) => {
        const cls = d.pct > 0 ? 'pos' : d.pct < 0 ? 'neg' : 'zero';
        const sign = d.pct > 0 ? '+' : '';
        return `<div class="market-chip"><div class="chip-name">${name}</div><div class="chip-val ${cls}">${sign}${d.pct}%</div></div>`;
      }).join('');

      // 內文 + 法說會
      const confs = report.conferences || [];
      let html = mdToHtml(report.content);
      if (confs.length > 0) {
        const items = confs.map(c =>
          `<span style="font-size:13px;color:#333;padding:2px 0;">${c.company}（${c.code}）</span>`
        ).join('');
        html += `<h2>📢 今日法說會（共 ${confs.length} 間）</h2>`
              + `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px 0;margin-top:8px;">${items}</div>`;
      }
      document.getElementById('report-content').innerHTML = html;
    } catch(e) {
      document.getElementById('report-content').innerHTML = `<p style="color:#f00">載入失敗：${e.message}</p>`;
    }
  }

  // 切換到晨報 tab 時才載入
  const _switchTab = switchTab;
  switchTab = function(name, btn) {
    _switchTab(name, btn);
    if (name === 'report') loadReport();
  };

  // ── 啟動 ──────────────────────────────────────────────────
  buildCalcRows();
  if (getToken()) {
    Promise.all([loadTodos(), loadCalc()]);
  } else {
    setSyncStatus('未設定 Token — 點右上角設定');
    render();
  }
</script>
</body>
</html>
