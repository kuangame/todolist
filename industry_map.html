<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>產業地圖</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f18;--surface:#14172280;--border:#252840;--text:#e2e4f0;--muted:#7880a0;}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;display:flex;flex-direction:column;}

.header{padding:9px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-title{font-size:.78rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.header-updated{font-size:.7rem;color:var(--muted);}

.main{flex:1;display:flex;overflow:hidden;}
#map-area{flex:1;min-width:0;position:relative;transition:flex .35s cubic-bezier(.4,0,.2,1);}
#map-area.shrink{flex:0 0 58%;}
#map-svg{width:100%;height:100%;cursor:default;}

#side-panel{width:0;overflow:hidden;transition:width .35s cubic-bezier(.4,0,.2,1);border-left:1px solid var(--border);background:#0f121c;}
#side-panel.open{width:42%;}
.panel-scroll{width:340px;height:100%;overflow-y:auto;padding:20px 18px 28px;}
.panel-scroll::-webkit-scrollbar{width:4px;}
.panel-scroll::-webkit-scrollbar-thumb{background:#252840;border-radius:2px;}

.panel-header{margin-bottom:16px;position:relative;padding-right:28px;}
.breadcrumb{font-size:.68rem;color:var(--muted);margin-bottom:4px;}
.panel-name{font-size:1.2rem;font-weight:800;margin-bottom:3px;}
.panel-summary{font-size:.78rem;color:var(--muted);line-height:1.5;}
.close-btn{position:absolute;top:0;right:0;background:#1e2244;border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.close-btn:hover{color:var(--text);}

.section{margin-bottom:15px;}
.sec-label{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.desc{font-size:.81rem;color:#b0b8d0;line-height:1.75;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;}
.tag{padding:3px 9px;border-radius:10px;font-size:.7rem;font-weight:600;border:1px solid;}
.stocks{font-size:.81rem;color:var(--text);line-height:1.9;}
.related-row{display:flex;flex-wrap:wrap;gap:5px;}
.related-link{font-size:.75rem;padding:2px 9px;border-radius:8px;border:1px solid var(--border);color:#818cf8;cursor:pointer;background:#818cf810;}
.related-link:hover{background:#818cf830;border-color:#818cf8;}

.node-group{cursor:pointer;}
@keyframes pulse{0%{r:0;opacity:.5}100%{r:40;opacity:0}}
.pulse-ring{animation:pulse 1.6s ease-out infinite;pointer-events:none;}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">🗺 產業地圖</span>
  <span class="header-updated" id="hdr-updated"></span>
</div>

<div class="main">
  <div id="map-area">
    <svg id="map-svg" viewBox="0 0 600 540" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="side-panel">
    <div class="panel-scroll" id="panel-content"></div>
  </div>
</div>

<script>
const CX = 300, CY = 290;   // centre of map
const R1 = 155;              // centre → industry
const R2 = 108;              // industry → child node

let allNodes = [];           // flat list: {node, x, y, angle, parentId|null}
let selectedId = null;

fetch('industry_map.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('hdr-updated').textContent = '更新：' + (data.updated || '');
    buildPositions(data.nodes);
    renderMap();
  })
  .catch(() => {
    document.getElementById('map-svg').innerHTML =
      '<text x="300" y="270" text-anchor="middle" fill="#7880a0" font-size="14">無法載入資料</text>';
  });

// ── Layout ────────────────────────────────────────────────────
function buildPositions(nodes) {
  allNodes = [];
  const n = nodes.length;
  nodes.forEach((node, i) => {
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    const x = CX + R1 * Math.cos(angle);
    const y = CY + R1 * Math.sin(angle);
    allNodes.push({ node, x, y, angle, parentId: null });

    // children
    if (node.children && node.children.length) {
      const kids = node.children;
      const k = kids.length;
      const spread = k === 1 ? 0 : Math.min(Math.PI * 0.65, (k - 1) * 0.55);
      kids.forEach((child, j) => {
        const offset = k === 1 ? 0 : spread * (j / (k - 1) - 0.5);
        const ca = angle + offset;
        allNodes.push({
          node: child,
          x: x + R2 * Math.cos(ca),
          y: y + R2 * Math.sin(ca),
          angle: ca,
          parentId: node.id
        });
      });
    }
  });
}

// ── Render ────────────────────────────────────────────────────
function renderMap() {
  const svg = document.getElementById('map-svg');
  svg.innerHTML = '';

  // Lines (bottom layer)
  const lg = mkSVG('g');
  allNodes.forEach(pos => {
    if (pos.parentId === null) {
      // centre → industry
      lg.appendChild(mkSVG('line', {
        x1: CX, y1: CY, x2: pos.x, y2: pos.y,
        stroke: pos.node.color, 'stroke-width': '1.8', opacity: '.3'
      }));
    } else {
      // find parent pos
      const pp = allNodes.find(p => p.node.id === pos.parentId);
      if (pp) {
        lg.appendChild(mkSVG('line', {
          x1: pp.x, y1: pp.y, x2: pos.x, y2: pos.y,
          stroke: pos.node.color, 'stroke-width': '1.5', opacity: '.35',
          'stroke-dasharray': '4,3'
        }));
      }
    }
  });
  svg.appendChild(lg);

  // Centre node
  const cg = mkSVG('g');
  cg.appendChild(mkSVG('circle', { cx: CX, cy: CY, r: 30, fill: '#818cf812', stroke: '#818cf8', 'stroke-width': '1.5' }));
  ['產業', '地圖'].forEach((t, i) => {
    const tx = mkSVG('text', { x: CX, y: CY - 4 + i * 14, 'text-anchor': 'middle', fill: '#818cf8', 'font-size': '10', 'font-weight': '700' });
    tx.textContent = t;
    cg.appendChild(tx);
  });
  svg.appendChild(cg);

  // Industry & child nodes
  allNodes.forEach(pos => drawNode(svg, pos));
}

function drawNode(svg, pos) {
  const { node, x, y } = pos;
  const isChild = pos.parentId !== null;
  const r = isChild ? 22 : 27;
  const isSelected = node.id === selectedId;
  const g = mkSVG('g', { class: 'node-group', id: 'nd-' + node.id });

  if (isSelected) {
    g.appendChild(mkSVG('circle', {
      cx: x, cy: y, r: 0, fill: 'none',
      stroke: node.color, 'stroke-width': '1.5', class: 'pulse-ring'
    }));
    g.appendChild(mkSVG('circle', {
      cx: x, cy: y, r: r + 7, fill: 'none',
      stroke: node.color, 'stroke-width': '1', 'stroke-dasharray': '4,3', opacity: '.5'
    }));
  }

  g.appendChild(mkSVG('circle', {
    cx: x, cy: y, r,
    fill: isSelected ? node.color + '40' : node.color + '18',
    stroke: node.color,
    'stroke-width': isSelected ? '2.5' : (isChild ? '1.5' : '2')
  }));

  // Name (may need 2 lines for long names)
  const name = node.name;
  const lines = name.length > 5 ? [name.slice(0, 5), name.slice(5)] : [name];
  lines.forEach((line, i) => {
    const dy = lines.length === 1 ? 4 : -3 + i * 13;
    const t = mkSVG('text', {
      x, y: y + dy, 'text-anchor': 'middle',
      fill: node.color, 'font-size': isChild ? '9' : '10', 'font-weight': '700',
      'pointer-events': 'none'
    });
    t.textContent = line;
    g.appendChild(t);
  });

  // Summary hint below node
  if (node.summary && !isChild) {
    const hint = mkSVG('text', {
      x, y: y + r + 13, 'text-anchor': 'middle',
      fill: node.color, 'font-size': '7.5', opacity: '.55',
      'pointer-events': 'none'
    });
    hint.textContent = node.sub ? node.sub.slice(0, 2).join(' · ') : '';
    g.appendChild(hint);
  }

  g.addEventListener('click', () => selectNode(node.id));
  svg.appendChild(g);
}

// ── Selection ─────────────────────────────────────────────────
function selectNode(id) {
  if (selectedId === id) { closePanel(); return; }
  selectedId = id;
  renderMap();
  const pos = allNodes.find(p => p.node.id === id);
  if (!pos) return;
  document.getElementById('map-area').classList.add('shrink');
  document.getElementById('side-panel').classList.add('open');
  renderPanel(pos);
}

function closePanel() {
  selectedId = null;
  document.getElementById('map-area').classList.remove('shrink');
  document.getElementById('side-panel').classList.remove('open');
  renderMap();
}

function renderPanel(pos) {
  const { node, parentId } = pos;
  const parent = parentId ? allNodes.find(p => p.node.id === parentId) : null;
  const crumb = parent ? `產業地圖 › ${parent.node.name} › ${node.name}` : `產業地圖 › ${node.name}`;

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-header">
      <div class="breadcrumb">${crumb}</div>
      <div class="panel-name" style="color:${node.color}">${node.name}</div>
      <div class="panel-summary">${node.summary || ''}</div>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>

    ${node.description ? `
    <div class="section">
      <div class="sec-label">說明</div>
      <div class="desc">${node.description}</div>
    </div>` : ''}

    ${node.sub && node.sub.length ? `
    <div class="section">
      <div class="sec-label">子產業 / 技術</div>
      <div class="tag-row">
        ${node.sub.map(s => `<span class="tag" style="color:${node.color};border-color:${node.color}40;background:${node.color}10">${s}</span>`).join('')}
      </div>
    </div>` : ''}

    ${node.stocks && node.stocks.length ? `
    <div class="section">
      <div class="sec-label">代表個股</div>
      <div class="stocks">${node.stocks.join('　')}</div>
    </div>` : ''}

    ${node.related && node.related.length ? `
    <div class="section">
      <div class="sec-label">相關</div>
      <div class="related-row">
        ${node.related.map(rid => {
          const rp = allNodes.find(p => p.node.id === rid || p.node.name === rid);
          return `<span class="related-link" onclick="selectNode('${rp ? rp.node.id : rid}')">→ ${rp ? rp.node.name : rid}</span>`;
        }).join('')}
      </div>
    </div>` : ''}
  `;
}

// ── SVG helper ─────────────────────────────────────────────────
function mkSVG(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
</script>
</body>
</html>
